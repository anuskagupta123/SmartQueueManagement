kind = "web"
previewPath = "/"
title = "SmartQueue AI"
version = "1.0.0"
id = "artifacts/smartqueue"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20167

[services.development]
run = "pnpm --filter @workspace/smartqueue run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smartqueue", "run", "build" ]
publicDir = "artifacts/smartqueue/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20167"
BASE_PATH = "/"
